<script>
  (function () {
    if (window.__fratMilanoCdnLoaderInitialized) {
      return;
    }
    window.__fratMilanoCdnLoaderInitialized = true;

    var REPO_SLUG = "lucacordone-ft/yapla-custom";
    var VERSION_FILE_URL = "https://raw.githubusercontent.com/" + REPO_SLUG + "/main/yapla/fraternita-milano.version.json";
    var FALLBACK_COMMIT_SHA = "54cbcf8fd0ba60d45795c78cb38c112da79531a5";
    var versionRequestToken = String(Date.now());
    var assetUrls = buildAssetUrls(FALLBACK_COMMIT_SHA);
    var LOGO_URL = "https://cdn.eu.yapla.com/company/CPYlrqE5JMgiN9xHsKemXuGLB/asset/images/LogoFraternita.svg";
    var BOOT_CLASS = "frat-booting";
    var INLINE_STYLE_ID = "frat-milano-critical-style";
    var STYLE_ID = "frat-milano-cdn-style";
    var SCRIPT_ID = "frat-milano-cdn-script";
    var SHELL_ID = "frat-milano-shell";
    var MOUNT_ID = "frat-milano-app-mount";

    function buildAssetUrls(commitSha) {
      var safeCommitSha = typeof commitSha === "string" ? commitSha.trim() : "";
      var baseUrl = "https://cdn.jsdelivr.net/gh/" + REPO_SLUG + "@" + safeCommitSha + "/yapla";

      return {
        commitSha: safeCommitSha,
        baseUrl: baseUrl,
        htmlUrl: baseUrl + "/fraternita-milano.html",
        cssUrl: baseUrl + "/fraternita-milano.css",
        jsUrl: baseUrl + "/fraternita-milano.js"
      };
    }

    function isValidCommitSha(value) {
      return /^[0-9a-f]{40}$/.test(String(value || "").trim());
    }

    function onReady(callback) {
      if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", callback, { once: true });
        return;
      }

      callback();
    }

    function applyImmediateState() {
      document.documentElement.classList.add(BOOT_CLASS);

      function applyBodyState() {
        if (document.body) {
          document.body.classList.add("frat-donation-page", "frat-is-loading");
        }
      }

      try {
        if (window.sessionStorage && window.sessionStorage.getItem("frat_payment_loader_pending") === "1") {
          document.documentElement.classList.add("frat-payment-nav-pending");
        }
      } catch (_error) {
      }

      if (document.body) {
        applyBodyState();
        return;
      }

      document.addEventListener("DOMContentLoaded", applyBodyState, { once: true });
    }

    function ensureCriticalStyles() {
      if (document.getElementById(INLINE_STYLE_ID)) {
        return;
      }

      var style = document.createElement("style");
      style.id = INLINE_STYLE_ID;
      style.textContent = [
        "html." + BOOT_CLASS + ",html." + BOOT_CLASS + " body{background:radial-gradient(circle at top left, rgba(237,178,80,.12), transparent 28%),radial-gradient(circle at top right, rgba(35,105,176,.12), transparent 30%),linear-gradient(180deg,#f8fbff 0%,#ffffff 40%,#f8fafc 100%)!important;}",
        "html." + BOOT_CLASS + " #site-wrapper,html." + BOOT_CLASS + " .poweredBy-wrapper{opacity:0!important;visibility:hidden!important;pointer-events:none!important;}",
        "body.frat-donation-page{padding:0!important;overflow-x:hidden;background:radial-gradient(circle at top left, rgba(237,178,80,.12), transparent 28%),radial-gradient(circle at top right, rgba(35,105,176,.12), transparent 30%),linear-gradient(180deg,#f8fbff 0%,#ffffff 40%,#f8fafc 100%);}",
        "body.frat-donation-page.frat-is-loading{overflow:hidden;}",
        "#frat-loader{position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;background:radial-gradient(circle at top left, rgba(237,178,80,.14), transparent 26%),radial-gradient(circle at top right, rgba(35,105,176,.14), transparent 28%),linear-gradient(180deg,rgba(248,251,255,.98) 0%,rgba(255,255,255,.98) 42%,rgba(248,250,252,.98) 100%);}",
        "#frat-loader .frat-loader__inner{display:grid;justify-items:center;gap:20px;}",
        "#frat-loader .frat-loader__logo{display:block;width:auto;max-width:min(68vw,260px);min-height:40px;max-height:68px;height:auto;}",
        "#frat-loader .frat-loader__spinner{width:34px;height:34px;border-radius:999px;border:3px solid rgba(35,105,176,.14);border-top-color:#2369b0;animation:frat-loader-spin 900ms linear infinite;}",
        "#frat-milano-shell{position:relative;z-index:1;}",
        "#frat-milano-app-mount:empty{min-height:1px;}",
        "@keyframes frat-loader-spin{to{transform:rotate(360deg)}}"
      ].join("");
      document.head.appendChild(style);
    }

    function createLoaderNode() {
      var loader = document.createElement("div");
      loader.id = "frat-loader";
      loader.className = "frat-loader frat-loader--initial";
      loader.setAttribute("aria-hidden", "true");
      loader.innerHTML = [
        '<div class="frat-loader__inner">',
        '  <img class="frat-loader__logo" src="' + LOGO_URL + '" alt="Fraternita">',
        '  <div class="frat-loader__spinner"></div>',
        "</div>"
      ].join("");
      return loader;
    }

    function ensureImmediateLoader() {
      var existing = document.getElementById("frat-loader");
      var parent;

      if (existing) {
        return existing;
      }

      parent = document.body || document.documentElement;
      existing = createLoaderNode();
      parent.appendChild(existing);
      return existing;
    }

    function ensureStylesheet() {
      var existing = document.getElementById(STYLE_ID);
      if (existing) {
        if (existing.href !== assetUrls.cssUrl) {
          existing.href = assetUrls.cssUrl;
        }
        return;
      }

      var link = document.createElement("link");
      link.id = STYLE_ID;
      link.rel = "stylesheet";
      link.href = assetUrls.cssUrl;
      document.head.appendChild(link);
    }

    function findNativeDonationLine() {
      var paymentRoot = document.querySelector(".single-page-donation-wrapper");
      if (paymentRoot) {
        return paymentRoot.closest(".line.site_line__item") || paymentRoot.closest(".line");
      }

      return document.querySelector(".line.site_line__item");
    }

    function ensureShell() {
      var existing = document.getElementById(SHELL_ID);
      var loader;
      if (existing) {
        return existing;
      }

      var shellLine = document.createElement("div");
      shellLine.id = SHELL_ID;
      shellLine.className = "line site_line__item";

      var container = document.createElement("div");
      container.className = "container";
      container.innerHTML = '<div id="' + MOUNT_ID + '"></div>';
      loader = ensureImmediateLoader();
      if (loader && loader.parentNode !== container) {
        container.insertBefore(loader, container.firstChild);
      }
      shellLine.appendChild(container);

      var nativeLine = findNativeDonationLine();
      if (nativeLine && nativeLine.parentNode) {
        nativeLine.parentNode.insertBefore(shellLine, nativeLine);
        return shellLine;
      }

      (document.body || document.documentElement).appendChild(shellLine);
      return shellLine;
    }

    function mountHtml(markup) {
      var shell = ensureShell();
      var mount = shell.querySelector("#" + MOUNT_ID);
      var temp;
      var nestedLoader;
      if (mount) {
        temp = document.createElement("div");
        temp.innerHTML = markup;

        nestedLoader = temp.querySelector("#frat-loader");
        if (nestedLoader) {
          nestedLoader.parentNode.removeChild(nestedLoader);
        }

        mount.innerHTML = temp.innerHTML;
      }
    }

    function loadScript() {
      var existing = document.getElementById(SCRIPT_ID);
      if (existing && existing.parentNode) {
        existing.parentNode.removeChild(existing);
      }

      var script = document.createElement("script");
      script.id = SCRIPT_ID;
      script.src = assetUrls.jsUrl;
      script.async = false;
      document.body.appendChild(script);
    }

    function resolveAssetUrls() {
      return fetch(VERSION_FILE_URL + "?v=" + encodeURIComponent(versionRequestToken), { cache: "no-store" })
        .then(function (response) {
          if (!response.ok) {
            throw new Error("HTTP " + response.status);
          }
          return response.json();
        })
        .then(function (payload) {
          var nextCommitSha = payload && payload.assetCommitSha;

          if (!isValidCommitSha(nextCommitSha)) {
            throw new Error("Commit SHA non valido nel version file");
          }

          assetUrls = buildAssetUrls(nextCommitSha);
        })
        .catch(function (error) {
          assetUrls = buildAssetUrls(FALLBACK_COMMIT_SHA);
          console.warn("[Fraternita Milano] Version file non disponibile, uso fallback:", error);
        });
    }

    function bootstrap(markup) {
      ensureShell();
      ensureStylesheet();
      mountHtml(markup);
      loadScript();
      document.documentElement.classList.remove(BOOT_CLASS);
    }

    applyImmediateState();
    ensureCriticalStyles();
    ensureImmediateLoader();

    resolveAssetUrls()
      .then(function () {
        return fetch(assetUrls.htmlUrl, { cache: "no-store" });
      })
      .then(function (response) {
        if (!response.ok) {
          throw new Error("HTTP " + response.status);
        }
        return response.text();
      })
      .then(function (markup) {
        onReady(function () {
          bootstrap(markup);
        });
      })
      .catch(function (error) {
        document.documentElement.classList.remove(BOOT_CLASS);
        console.error("[Fraternita Milano] Caricamento asset fallito:", error);
      });
  })();
</script>
